- description: "Literally, actually went nocturnal over Christmas break and figured out to compile Android to create Martini, an Android ROM whose only additions were a slick boot animation I made in After Effects, and removing Android's 16-digit PIN limit."
- description: "Used Google's Android VR API to create a 3D audio meditation environment. Mine was supposed to be a cliff far above the ocean, surrounded by wind."
- description: "Using GTVHacker's Nest Thermostat exploit, wrote and cross-compiled a C program to play Mary Had a Little Lamb after figuring out how to use the beeper driver."
- description: "Also created a mobile app to run shell commands over SSH to disable and re-enable PIN lock on the Nest Thermostat. Don't tell my dad."
- description: "Created Node.js/Electron program to send screenshots to someone at random intervals using Pushbullet."
- description: "Wrote a fake caller app to get out of sticky situations, activated by phone proximity sensor. Never actually used it because it seemed dishonest."
- description: "Created a website to randomly pick jelly beans for the Jelly Belly Beanboozled game. Included some fun jQuery driven animations."
- description: "Built an Android object guessing game, hackathon-style, over 3 days with a friend who was new to Android. Included multiplayer room functionality."
- description: "Created https://byu.studyspots.app, a list of all empty classrooms on BYU campus sorted by length of availability at current time."
- description: "Created my website and resume with Gatsby.js in TypeScript."
- description: "Created \"The Show Stops,\" a virus simulator for a blog post, first in JavaScript, then again in Rust with WebAssembly. Spent an unhealthy amount of time profiling and optimizing."
- description: "Wrote a Python script to show current battery percentage in big ASCII text using pyfiglet."
- description: "Wrote \"5-mbps-internet-sucks,\" a Jupyter notebook using video download times to demonstrate how... 5 Mbps internet sucks."
- description: "Using the inimitable Django with Django Rest Framework, and TypeScript with React, started \"lifelab,\" a personal experiment in personal improvement using experimentation."
- description: "Worked through the first part of version 3 of the fast.ai course."
- description: "Created a Jupyter notebook prototyping workflow, server, and frontend for generating and practicing math problems, rendered in LaTeX. Then went back and implemented a new static problem type, backed by SQLite."
- description: "Created a live \"smile, you're on camera\" service for my laptop."
- description: "Created basic blacklist proxy in Go."
- description: "Wrote \"Slingshot,\" a browser handler for Android that shares links."
- description: "Created a physics simulation with Matter.js that doubles as a timer."
- description: "Built a proxy/holding room for automatically starting Google Compute Engine instances with Minecraft servers."
- description: "Created Google Cloud Storage-backed personal document system with basic object storage system, encrypted using cryptography.io Fernet, accessed with Python client opening Vim to temporary files that are then erased using `shred`."
- description: "Wrote a mobile app using Flutter/Dart to make a clicking sound a number of times per second, with the questionable hypothesis that it would make it easier for me to focus."
- description: "Built a mobile app that plays a random note on the middle octave (4) of a piano to train pitch recognition."
- description: "Created \"spaaaace\"--an ASCII-art Android live wallpaper based on the open-source Java applet by the same creator of another closed-source live wallpaper."
- description: "Created \"AsciiPoet\" in Processing to make it much easier to draw ASCII things (specifically spaceships)."
- description: "Wrote a mobile app to interface with a Node.js man-in-the-middle server on an Raspberry PI acting as an evil twin Wi-Fi point using arpspoof and SSLstrip. It was built specifically to intercept and alter the source of a random name picker my Seminary teacher used to pick who would say the closing prayer, make requests to my server instead of picking from the list. I set the response with my mobile app. I was able to prove that it worked, but I never used it. I'm both patting myself and kicking myself for this."
- description: "The first project I can remember was a Window Batch script I build when I was 11 called \"Windows Utility.\" It took a keyword as input and did anything from ejecting the CD to automatically replacing the Ease of Access tools on the login screen with an elevated command line."
- description: "Sunk a lot of time into \"ClusterView,\" a concept on Android for a data visualization with nested circles. This never came to fruition."
- description: "Wrote \"humen,\" the beginnings of a population simulator that modeled human characteristics by giving them probabilities. This was my intuitive crash course in the Law of Large Numbers."
- description: "Wrote a Processing application to generate an image with trails created by \"ants,\" which can randomly move one pixel an any direction in any given timestep. I wanted to print and frame one of its outputs, but I think I'm glad I didn't."
- description: "Dipped my toe into Visual Basic for standalone applications, and tried to create a collaborative whiteboard service."
- description: "In my first exposure to the Android Open Source Project, I found the source for Android 4.4 KitKat's \"Dessert Case\" easter egg and spun it into a standalone app with a settings activity to control aspects of the visualization."
- description: "Wrote a prompt game in C++--\"How old are you?,\", \"what school do you go to?\"--it always answered with something along the lines of \"me too!\". Also came with a random number guessing routine." 
- description: "Wrote a Windows keylogger in C++. If I remember right, it only worked some of the time."
- description: "Wrote an Electron application--\"Anthro\"--that would regularly poll a Firebase database to allow me to remotely log off a user on a desktop, when run as a service. This came in handy when a sibling decided to wreak havoc on my Google account from my Windows account, which I had forgotten to lock."
- description: "Went to a farmer's market once and lamented at the lack of visibility into inventory. Proceeded to spend the next 4 years trying to get a mobile app to market to solve this very problem. Unfortunately, everyone used iPhones and I couldn't afford a Mac to develop with."
- description: "Created \"productif, \" a Flutter app for Android to mark whether I was being productive or not at any given point in time. Wrote a fun scrollable, zoomable heatmap of how productive I'd been during the day to go with it."
- description: "Tried to bring \"Timekeeper,\" an adaptive scheduling app, into existence."
- description: "Started \"Venture,\" the proof-of-concept beginnings of a Terraria clone that I really didn't want anyone to call a Terraria clone. Created a basic physics engine and seamless, destructible tile world from scratch, including implementing my own basic occlusion culling to only render tiles on screen. Also had some fun with GLSL bloom shading and lighting."
- description: "Created a magic 8 ball app for a workshop on Flutter I was scheduled to present at BYU ACM's YHack event before COVID-19 rolled up."
- description: "Found the sad, old source for West Point Bridge Designer on SourceForge, converted it to Gradle and got it working on Gnome/GTK+."
- description: "Created a Flutter app to cure my own intermittent indeciciveness with a drag-and-drop list."
- description: "Created \"thattracks,\" a toy pixel tracking server that sends a Twilio text message with a keyword provided to the endpoint."
- description: "Built a crappy proof of concept in Jupyter for extracting and realigning PowerPoint slides from images and doing OCR with Google Cloud Vision."
- description: "Created a PHP service for generating PDF book covers with TCPDF, as well as chapters with page numbers. The big idea was to create an online journalling service that would use lulu.com to automatically send you nice, hard-cover books containing all of your darkest secrets, something like Chatbooks. Feel free to steal this idea if you want."
- description: "Mounted a phone on a tripod and wrote an app to have it regularly take pictures of me while I was working and save them to Google Cloud Storage as an attempt to trick myself into being more productive."
- description: "Wrote a Firebase-backed flower delivery subscription service using with recurring billing using Stripe for my mother's flower farm."
- description: "Figured out how to use Walmart's closed Grocery REST API in a Jupyter notebook, which included building a cookie copier Chrome extension and coming up with a clever solution for electrode-csrf-jwt's `x-csrf-jwt` cross-site request forgery protection. I added a bottle of A1 steak sauce to my shopping cart from a Jupyter notebook and did a victory lap."
- description: "Using the AOSP date picker as a base, wrote a date picker restricted to an available date list."
- description: "Created an app to gamify short-term habit streaks, with a fun points system that compounded as the streak got longer. It also included negative reinforcement with several levels of severity, including things like push-ups, running, and singing songs."
- description: "Figured out how to programmatically remove watermarks on PDFs from a PDF conversion website and let the owner know privately. He was great about it."
- description: "Discovered that a file storage website was storing private files using a sequential URL scheme and no authentication requirement. I let the owner know and he was not great about it."
- description: "Created what I called the \"floating spec,\" a system of rules for myself where I would review each rule increasingly less often, borrowing an idea from spaced repetition memorization. It was completely in the command line, driven by python-prompt-toolkit and backed by the encrypted object-based document system I mentioned somewhere else on this list."
- description: "Created a religious app requested by the president of the Latter-day Saint missionaries assigned to my geograpical area. The missionaries liked the app, but IBM MaaS360 resisted my every attempt to sideload it."
- description: "Figured out how to get into the Poptropica dev console by looking up the MD5 hash for the password. They changed it."
- description: "Figured out how to get into JavaScript Poptropica's dev console again by doing some nifty reverse-engineering in the Chrome console."
